version: '3.8'

services:
  # ==================== PostgreSQL ====================
  postgres:
    image: postgres:16-alpine
    container_name: apirental-postgres
    environment:
      POSTGRES_USER: apirental
      POSTGRES_PASSWORD: apirental_secret
      POSTGRES_DB: apirental
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U apirental"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==================== Redis ====================
  redis:
    image: redis:7-alpine
    container_name: apirental-redis
    command: redis-server --appendonly yes --requirepass redis_secret
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "redis_secret", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==================== Backend (FastAPI) ====================
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: apirental-backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://apirental:apirental_secret@postgres:5432/apirental
      - REDIS_URL=redis://:redis_secret@redis:6379/0
      - USE_FAKE_REDIS=false
      - JWT_SECRET=${JWT_SECRET:-change-me-in-production}
      - OPENAI_API_KEYS=${OPENAI_API_KEYS:-}
      - ANTHROPIC_API_KEYS=${ANTHROPIC_API_KEYS:-}
      - GEMINI_API_KEYS=${GEMINI_API_KEYS:-}
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY:-}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  # ==================== Frontend (Vite/React) ====================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: apirental-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
